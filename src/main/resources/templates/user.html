<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Мой профиль</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar {
            min-height: calc(100vh - 56px);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <div class="container-fluid">
        <div class="d-flex align-items-center gap-2">
            <span class="text-light">
                <strong th:text="${#authentication.name}"></strong>
                <span> with roles: </span>
                <span th:each="role, iterStat : ${#authentication.authorities}">
                    <span th:text="${#strings.replace(role.authority, 'ROLE_', '')}"></span>
                    <span th:if="${!iterStat.last}">, </span>
                </span>
            </span>
        </div>
        <form method="post" action="/logout" class="m-0">
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <div class="col-md-2 bg-light sidebar p-0">
            <div class="list-group rounded-0">
                <a th:href="@{/user}" class="list-group-item list-group-item-action active border-0">User</a>
            </div>
        </div>

        <div class="col-md-10">
            <div class="mt-3">
                <h4 class="fs-2 mb-0">User information-page</h4>
                <div class="card mt-3">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">About user</h5>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-bordered table-striped mb-0">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Department</th>
                                <th>Salary</th>
                                <th>Role</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="u : ${user}">
                                <td th:text="${u.id}">1</td>
                                <td th:text="${u.name}">Name</td>
                                <td th:text="${u.surName}">Surname</td>
                                <td th:text="${u.department}">Department</td>
                                <td th:text="${u.salary}">0</td>
                                <td>
                            <span th:each="role, iterStat : ${u.roles}">
                                <span th:text="${#strings.replace(role.name, 'ROLE_', '')}"></span>
                                <span th:if="${!iterStat.last}">, </span>
                            </span>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
