<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактирование пользователя</title>
</head>
<body>
<h1>Редактирование пользователя</h1>

<form th:action="@{/users/update}" th:object="${user}" method="post">

    <input type="hidden" th:field="*{id}" />

    <label for="name">Имя:</label>
    <input type="text" th:field="*{name}" id="name" required>
    <br><br>

    <label for="surName">Фамилия:</label>
    <input type="text" th:field="*{surName}" id="surName" required>
    <br><br>

    <label for="department">Отдел:</label>
    <input type="text" th:field="*{department}" id="department" required>
    <br><br>

    <label for="salary">Зарплата:</label>
    <input type="number" th:field="*{salary}" id="salary" required>
    <br><br>

    <label for="password">Пароль:</label>
    <input type="password" th:field="*{password}" id="password" required>
    <br><br>

    <button type="submit">Обновить</button>
</form>

<br>
<a th:href="@{/users}">Назад к списку</a>
</body>
</html>
