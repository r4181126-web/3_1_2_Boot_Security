<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Create user</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <div class="container-fluid">
        <div class="d-flex align-items-center gap-2">
            <span class="text-light">
                <strong th:text="${#authentication.name}"></strong>
                <span> with roles: </span>
                <span th:each="role, iterStat : ${#authentication.authorities}">
                    <span th:text="${#strings.replace(role.authority, 'ROLE_', '')}"></span>
                    <span th:if="${!iterStat.last}">, </span>
                </span>
            </span>
        </div>
        <form method="post" action="/logout" class="m-0">
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container-fluid mt-3">
    <div class="row">
        <div class="col-md-2">
            <div class="list-group">
                <a th:href="@{/admin}" class="list-group-item list-group-item-action">Admin</a>
                <a th:href="@{/user}" class="list-group-item list-group-item-action">User</a>
            </div>
        </div>

        <div class="col-md-10">
            <div class="card">
                <div class="card-header bg-white">
                    <h4 class="mb-0">Add new user</h4>
                </div>
                <div class="card-body">

                    <form action="#" th:action="@{/admin/add}" th:object="${user}" method="post">

                        <div class="mb-3">
                            <label for="username" class="form-label fw-bold">Username</label>
                            <input type="text" th:field="*{username}" id="username" class="form-control" placeholder="Логин" required>
                        </div>

                        <div class="mb-3">
                            <label for="name" class="form-label fw-bold">First name</label>
                            <input type="text" th:field="*{name}" id="name" class="form-control" placeholder="Имя">
                        </div>

                        <div class="mb-3">
                            <label for="surName" class="form-label fw-bold">Last name</label>
                            <input type="text" th:field="*{surName}" id="surName" class="form-control" placeholder="Фамилия">
                        </div>

                        <div class="mb-3">
                            <label for="department" class="form-label fw-bold">Department</label>
                            <input type="text" th:field="*{department}" id="department" class="form-control" placeholder="Работа">
                        </div>

                        <div class="mb-3">
                            <label for="salary" class="form-label fw-bold">Salary</label>
                            <input type="number" th:field="*{salary}" id="salary" class="form-control" placeholder="Зарплата">
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label fw-bold">Пароль:</label>
                            <input type="password" th:field="*{password}" id="password" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Role</label>
                            <select name="roles" class="form-select">
                                <option value="1">ADMIN</option>
                                <option value="2">USER</option>
                            </select>
                        </div>

                        <div class="d-flex gap-2 mt-3">
                            <button type="submit" class="btn btn-success">Add new user</button>
                            <a th:href="@{/admin}" class="btn btn-secondary">Back to list</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
