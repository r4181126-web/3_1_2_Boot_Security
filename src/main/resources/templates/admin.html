<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
<h1>Admin Panel</h1>
<p>Добро пожаловать, <span th:text="${#authentication.name}"></span>!</p>

<h2>Список пользователей</h2>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Name</th>
        <th>SurName</th>
        <th>Department</th>
        <th>Salary</th>
        <th>Roles</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="u : ${users}">
        <td th:text="${u.id}">1</td>
        <td th:text="${u.username}">user</td>
        <td th:text="${u.name}">Name</td>
        <td th:text="${u.surName}">Surname</td>
        <td th:text="${u.department}">Department</td>
        <td th:text="${u.salary}">0</td>
        <td th:text="${u.roles}">ROLE_USER</td>

        <td>
            <a th:href="@{/users/edit/{id}(id=${u.id})}">Edit</a>
            &nbsp;|&nbsp;
            <form th:action="@{/users/delete}" method="post" style="display:inline">
                <input type="hidden" name="id" th:value="${u.id}">
                <button type="submit" style="background:none; border:none; color:blue; cursor:pointer; text-decoration:underline; display:inline;">
                    Delete
                </button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<br>
<a th:href="@{/users/new}">Add New User</a>
<br><br>

<form th:action="@{/logout}" method="post">
    <button type="submit">Logout</button>
</form>
</body>
</html>
