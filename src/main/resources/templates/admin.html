<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <div class="container-fluid">
        <div class="d-flex align-items-center gap-2">
            <span class="text-light">
                <strong th:text="${#authentication.name}"></strong>
                <span> with roles: </span>
                <span th:each="role, iterStat : ${#authentication.authorities}">
                    <span th:text="${#strings.replace(role.authority, 'ROLE_', '')}"></span>
                    <span th:if="${!iterStat.last}">, </span>
                </span>
            </span>
        </div>
        <form method="post" action="/logout" class="m-0">
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container-fluid mt-3">
    <div class="row">
        <div class="col-md-2">
            <div class="list-group">
                <a th:href="@{/admin}" class="list-group-item list-group-item-action active">Admin</a>
                <a th:href="@{/user}" class="list-group-item list-group-item-action">User</a>
            </div>
        </div>

        <div class="col-md-10">
            <ul class="nav nav-tabs mb-2">
                <li class="nav-item">
                    <a class="nav-link active" href="#">Users table</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/new}">New User</a>
                </li>
            </ul>

            <h2 class="mb-3">All Users</h2>

            <table class="table table-bordered table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Name</th>
                    <th>SurName</th>
                    <th>Department</th>
                    <th>Salary</th>
                    <th>Roles</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="u : ${admin}">
                    <td th:text="${u.id}">1</td>
                    <td th:text="${u.username}">user</td>
                    <td th:text="${u.name}">Name</td>
                    <td th:text="${u.surName}">Surname</td>
                    <td th:text="${u.department}">Department</td>
                    <td th:text="${u.salary}">0</td>
                    <td>
            <span th:each="role, iterStat : ${u.roles}">
                <span th:text="${#strings.replace(role.name, 'ROLE_', '')}"></span>
                <span th:if="${!iterStat.last}">, </span>
            </span>
                    </td>
                    <td>
                        <a th:href="@{/admin/edit/{id}(id=${u.id})}" class="btn btn-sm btn-primary">Edit</a>
                        <button type="button" class="btn btn-sm btn-danger ms-1"
                                data-bs-toggle="modal"
                                data-bs-target="#deleteModal"
                                th:data-id="${u.id}"
                                th:data-name="${u.name}">Delete</button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
    <!-- Модальное окно удаления -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title" id="deleteModalLabel">Delete user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this user?</p>
                <p><strong>User:</strong> <span id="deleteUserName"></span></p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <form id="deleteForm" method="post" action="">
                    <button type="submit" class="btn btn-danger">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const deleteModal = document.getElementById('deleteModal');
    if (deleteModal) {
        deleteModal.addEventListener('show.bs.modal', function (event) {
            const button = event.relatedTarget;
            const userId = button.getAttribute('data-id');
            const userName = button.getAttribute('data-name');

            const deleteForm = document.getElementById('deleteForm');
            deleteForm.action = '/admin/delete?id=' + userId;

            const userNameSpan = document.getElementById('deleteUserName');
            userNameSpan.textContent = userName + ' (ID: ' + userId + ')';
        });
    }
</script>
</body>
</html>
