<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Список пользователей</title>
    <style>
        table {
            border-collapse: collapse;
            width: 80%;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
<h1>Список пользователей</h1>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Имя</th>
        <th>Фамилия</th>
        <th>Отдел</th>
        <th>Зарплата</th>
        <th colspan="2">Действия</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}">1</td>
        <td th:text="${user.name}">Иван</td>
        <td th:text="${user.surName}">Иванов</td>
        <td th:text="${user.department}">IT</td>
        <td th:text="${user.salary}">1000</td>

        <td>
            <form th:action="@{/users/delete}" method="post">
                <input type="hidden" name="id" th:value="${user.id}" />
                <button type="submit">Удалить</button>
            </form>
        </td>

        <td>
            <a th:href="@{/users/edit/{id}(id=${user.id})}">Редактировать</a>
        </td>
    </tr>
    </tbody>
</table>

<p th:if="${#lists.isEmpty(users)}">Список пользователей пуст.</p>

<p><a th:href="@{/users/new}">Добавить нового пользователя</a></p>
</body>
</html>
